<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Parcours de français</title>
    <style>
      :root { color-scheme: light; font-family: Inter, Arial, sans-serif; color:#25314d; background:#f5f7fb; }
      * { box-sizing:border-box; } body { margin:0; } button, select { font:inherit; }
      .app { display:grid; grid-template-columns:320px 1fr; min-height:100vh; }
      .sidebar { background:#132440; color:#fff; padding:24px 18px; }
      .brand { font-size:20px; margin:0 0 6px; } .subtitle { color:#bfcce0; font-size:13px; margin:0 0 22px; }
      label { display:block; color:#bfcce0; font-size:12px; margin-bottom:6px; text-transform:uppercase; letter-spacing:.08em; }
      select { width:100%; border:0; border-radius:8px; padding:10px; margin-bottom:20px; }
      .module { margin:16px 0; } .module-title { color:#8fd4ff; font-size:13px; letter-spacing:.06em; text-transform:uppercase; }
      .module-description { color:#bfcce0; font-size:12px; line-height:1.4; margin:4px 0 8px; }
      .rule-button { display:block; width:100%; border:0; border-left:3px solid transparent; background:transparent; color:#fff; cursor:pointer; padding:10px; text-align:left; border-radius:4px; }
      .rule-button:hover, .rule-button.active { background:#243a5c; border-left-color:#8fd4ff; }
      .rule-level { display:block; color:#bfcce0; font-size:11px; margin-top:4px; }
      main { padding:40px clamp(20px, 5vw, 76px); max-width:1200px; width:100%; }
      .welcome, .course { background:#fff; border-radius:14px; box-shadow:0 8px 24px #1a315018; padding:clamp(20px, 4vw, 42px); }
      .eyebrow { color:#4477a9; font-size:12px; letter-spacing:.1em; text-transform:uppercase; }
      h1 { color:#162b49; font-size:clamp(28px, 4vw, 42px); margin:8px 0; } h2 { color:#162b49; }
      .objective { color:#52637a; line-height:1.6; } .tabs { display:flex; gap:8px; flex-wrap:wrap; border-bottom:1px solid #dfe6ef; margin:30px 0 20px; padding-bottom:10px; }
      .tab { background:#eef3f8; border:0; border-radius:20px; color:#35516f; cursor:pointer; padding:9px 14px; }
      .tab.active { background:#156a9f; color:#fff; } .panel { line-height:1.7; }
      .panel table { border-collapse:collapse; width:100%; margin-top:14px; } th { background:#eef5fa; text-align:left; } th, td { border:1px solid #dbe4ee; padding:10px; vertical-align:top; }
      .warning { border-left:5px solid #f3a847; background:#fff8e9; padding:14px 18px; }
      .mistake { border:1px solid #e1e8f0; border-radius:8px; margin:12px 0; padding:14px; } .mistake p { margin:5px 0; }
      .exercise { border:1px solid #dbe4ee; border-radius:10px; padding:18px; } .question { background:#f6f8fb; border-radius:6px; margin:8px 0; padding:10px; }
      .empty, .error { color:#64748b; } .error { color:#b42318; }
      @media (max-width:760px) { .app { display:block; } .sidebar { min-height:auto; } main { padding:18px; } .panel { overflow-x:auto; } }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1 class="brand">Parcours de français</h1>
        <p class="subtitle">Cours structurés pour italophones</p>
        <label for="levelSelect">Niveau CECRL</label>
        <select id="levelSelect"><option value="">Tous les niveaux</option></select>
        <nav id="modulesList" aria-label="Modules pédagogiques"></nav>
      </aside>
      <main><section id="content" class="welcome"><span class="eyebrow">Bienvenue</span><h1>Choisissez un cours</h1><p class="objective">Sélectionnez un module et une règle dans la barre latérale pour commencer votre apprentissage.</p></section></main>
    </div>
    <script src="/main.js"></script>
  </body>
</html>
